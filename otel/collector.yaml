apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: url-shortener
data:
  collector.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        send_batch_size: 1024
        timeout: 5s
      # Add pod / namespace metadata to every span and metric.
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.node.name

    exporters:
      # Forward traces to Jaeger via OTLP gRPC.
      otlp/jaeger:
        endpoint: jaeger:4317
        tls:
          insecure: true
      # Expose metrics in Prometheus exposition format for scraping.
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: urlshortener
        send_timestamps: true
        enable_open_metrics: true

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [batch, k8sattributes]
          exporters:  [otlp/jaeger]
        metrics:
          receivers:  [otlp]
          processors: [batch, k8sattributes]
          exporters:  [prometheus]
---
# RBAC so the collector can read pod metadata for k8sattributes processor.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: url-shortener
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-url-shortener
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-url-shortener
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: url-shortener
roleRef:
  kind: ClusterRole
  name: otel-collector-url-shortener
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: url-shortener
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: collector
          # contrib image includes k8sattributes, prometheus exporter, etc.
          image: otel/opentelemetry-collector-contrib:0.104.0
          args:
            - "--config=/conf/collector.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: prometheus
              containerPort: 8889
            - name: health
              containerPort: 13133
          volumeMounts:
            - name: config
              mountPath: /conf
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: url-shortener
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: prometheus
      port: 8889
      targetPort: prometheus
  type: ClusterIP
