version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/query.sql"
    schema: "internal/db/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "INTEGER"
            nullable: true
            go_type: "database/sql.NullInt64"
