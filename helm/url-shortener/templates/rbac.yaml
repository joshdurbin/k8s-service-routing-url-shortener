apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "url-shortener.serviceAccountName" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
---
# Allows pods to read EndpointSlices (peer discovery) and patch their own labels
# (raft-role updates for Istio subset routing). Scoped to the app namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "url-shortener.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
rules:
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "url-shortener.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "url-shortener.serviceAccountName" . }}
    namespace: {{ .Values.namespace.name }}
roleRef:
  kind: Role
  name: {{ include "url-shortener.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
