# ---- Admin UI frontend (SvelteKit → nginx) ----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "url-shortener.fullname" . }}-adminui
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
    app.kubernetes.io/component: adminui
spec:
  replicas: {{ .Values.adminui.replicaCount }}
  selector:
    matchLabels:
      app: url-shortener-adminui
  template:
    metadata:
      labels:
        app: url-shortener-adminui
        version: v1
    spec:
      containers:
        - name: adminui
          image: {{ .Values.adminui.image.registry }}/{{ .Values.adminui.image.repository }}:{{ .Values.adminui.image.tag }}
          imagePullPolicy: {{ .Values.adminui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 20m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "url-shortener.fullname" . }}-adminui
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
    app.kubernetes.io/component: adminui
spec:
  type: ClusterIP
  selector:
    app: url-shortener-adminui
  ports:
    - name: http
      port: 80
      targetPort: http
