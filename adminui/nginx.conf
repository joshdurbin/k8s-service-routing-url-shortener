server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA catch-all: return index.html for any client-side route.
    # Admin API calls (/admin/v0/) are routed by Istio to the StatefulSet's
    # AdminService gRPC endpoint via grpc_json_transcoder — nginx never sees them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
